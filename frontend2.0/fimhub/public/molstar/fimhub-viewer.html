<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FimH Structure Viewer</title>
    <link rel="stylesheet" type="text/css" href="./molstar.css" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f4f5f0;
      }

      #app {
        position: absolute;
        inset: 0;
      }

      #status {
        position: absolute;
        left: 12px;
        top: 12px;
        z-index: 20;
        max-width: min(30rem, calc(100% - 24px));
        padding: 10px 12px;
        border: 1px solid rgba(20, 28, 32, 0.14);
        background: rgba(255, 255, 255, 0.94);
        color: #233238;
        font: 12px/1.5 Arial, sans-serif;
        letter-spacing: 0.02em;
      }

      #status[data-tone='error'] {
        border-color: rgba(165, 28, 48, 0.22);
        color: #8b1e33;
      }

      #status[data-tone='ready'] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="status">Preparing viewer…</div>

    <script type="text/javascript" src="./molstar.js"></script>
    <script type="text/javascript">
      const params = new URLSearchParams(window.location.search);
      const statusNode = document.getElementById('status');

      function setStatus(message, tone) {
        statusNode.textContent = message;
        statusNode.dataset.tone = tone || 'info';
      }

      function getString(name) {
        return (params.get(name) || '').trim();
      }

      function getNumber(name) {
        const value = Number.parseInt(getString(name), 10);
        return Number.isFinite(value) ? value : null;
      }

      async function highlightResidue(viewer, residueId) {
        if (!Number.isFinite(residueId)) {
          return;
        }

        const loci = {
          elements: { beg_auth_seq_id: residueId, end_auth_seq_id: residueId },
        };

        viewer.structureInteractivity({
          ...loci,
          action: 'highlight',
        });

        viewer.structureInteractivity({
          ...loci,
          action: 'focus',
          focusOptions: { extraRadius: 4 },
        });
      }

      async function boot() {
        const structureUrl = getString('structure-url');
        const structureFormat = getString('structure-url-format') || 'pdb';
        const structureIsBinary = getString('structure-url-is-binary') === '1';
        const residueId = getNumber('focus-auth-residue') ?? getNumber('highlight-auth-residue');

        if (!structureUrl) {
          setStatus('No structure URL was provided to the embedded viewer.', 'error');
          return;
        }

        setStatus('Loading structure…', 'info');

        try {
          const viewer = await molstar.Viewer.create('app', {
            layoutIsExpanded: true,
            layoutShowControls: false,
            layoutShowRemoteState: false,
            layoutShowSequence: false,
            layoutShowLog: false,
            layoutShowLeftPanel: false,
            viewportShowExpand: false,
            viewportShowSelectionMode: false,
            viewportShowAnimation: false,
            viewportShowControls: false,
            viewportShowScreenshotControls: false,
            viewportShowSettings: false,
            viewportShowReset: false,
            pdbProvider: 'rcsb',
            emdbProvider: 'rcsb',
            collapseLeftPanel: true,
            powerPreference: 'high-performance',
          });

          await viewer.loadStructureFromUrl(structureUrl, structureFormat, structureIsBinary, {
            label: getString('mutation-label') || 'FimH mutation model',
          });

          window.setTimeout(() => {
            highlightResidue(viewer, residueId);
          }, 900);

          setStatus('Ready', 'ready');
        } catch (error) {
          console.error(error);
          setStatus(`Structure load failed: ${error && error.message ? error.message : error}`, 'error');
        }
      }

      boot();
    </script>
  </body>
</html>
